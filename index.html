<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaartje Dashboard</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            padding: 40px 24px;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header h1 span { color: #ED9B61; }

        .header p {
            color: #888;
            margin-top: 6px;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto 32px;
        }

        .stat-card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.2s;
        }

        .stat-card:hover { border-color: #ED9B61; }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        .stat-sub {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto 32px;
        }

        .chart-card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Bar chart */
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bar-label {
            width: 90px;
            font-size: 13px;
            color: #aaa;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            min-width: 2px;
        }

        .bar-count {
            width: 36px;
            font-size: 13px;
            color: #666;
            text-align: left;
            flex-shrink: 0;
        }

        /* Donut chart */
        .donut-container {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .donut-svg { flex-shrink: 0; }

        .donut-legend { display: flex; flex-direction: column; gap: 8px; }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #aaa;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-count {
            color: #555;
            margin-left: auto;
            padding-left: 12px;
        }

        /* Timeline */
        .timeline-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 120px;
            padding-top: 8px;
        }

        .timeline-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }

        .timeline-bar {
            width: 100%;
            max-width: 32px;
            background: #ED9B61;
            border-radius: 4px 4px 0 0;
            transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            min-height: 2px;
        }

        .timeline-label {
            font-size: 10px;
            color: #555;
            margin-top: 6px;
            text-align: center;
        }

        /* Recent table */
        .table-card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
        }

        .table-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            padding: 8px 12px;
            border-bottom: 1px solid #222;
        }

        td {
            padding: 10px 12px;
            font-size: 13px;
            color: #aaa;
            border-bottom: 1px solid #1a1a1a;
        }

        tr:hover td { color: #ddd; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-vertical { background: #1a2a1a; color: #6bba6b; }
        .badge-horizontal { background: #1a1a2a; color: #6b8bba; }
        .badge-postcard { background: #2a1a2a; color: #ba6bba; }
        .badge-diecut { background: #2a2218; color: #ED9B61; }
        .badge-saved { background: #1a2a1a; color: #6bba6b; }
        .badge-abandoned { background: #2a1a1a; color: #ba6b6b; }

        /* Burst-cluster rows: collapsed groups of rapid-fire sessions
           from the same device. Click the header to expand. */
        tr.cluster-header { cursor: pointer; }
        tr.cluster-header td {
            background: #131313;
            color: #888;
            font-size: 12px;
            padding: 10px 12px;
        }
        tr.cluster-header:hover td { background: #181818; color: #ccc; }
        tr.cluster-header .cluster-arrow {
            display: inline-block;
            width: 14px;
            color: #555;
            transition: transform 0.15s;
        }
        /* Expanded groups read as ONE block: the header pins to the top of
           the viewport while its children scroll (needs overflow:visible on
           the timeline's .table-card, set inline), and a brand accent runs
           down the whole group's left edge. */
        tr.cluster-header.open td {
            position: sticky; top: 0; z-index: 5;
            background: #1c1c1c;
            color: #ccc;
            border-left: 2px solid #ED9B61;
            border-bottom: 1px solid #2a2a2a;
        }
        tr.cluster-row td {
            background: #101010;
        }
        tr.cluster-row td:first-child {
            border-left: 2px solid #ED9B61;
            padding-left: 24px;
        }

        .loading {
            text-align: center;
            padding: 80px 0;
            color: #555;
            font-size: 15px;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .refresh-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: #ED9B61;
            color: #ED9B61;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Small pill-style checkbox for the "Show internal" toggle. */
        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .toggle:hover { border-color: #ED9B61; color: #ED9B61; }

        .toggle input { accent-color: #ED9B61; cursor: pointer; }

        /* --- Tabs -------------------------------------------------------
           Overview (stats + funnels + charts) and the Capture Timeline live
           on separate tabs — the timeline is a long forensic table that
           buried the charts below it, especially on phones. */
        .tab-bar {
            max-width: 1200px;
            margin: 0 auto 24px;
            display: flex;
            gap: 8px;
        }
        .tab-btn {
            background: #191919;
            border: 1px solid #222;
            color: #888;
            padding: 8px 18px;
            border-radius: 99px;
            font-size: 14px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #ED9B61;
            border-color: #ED9B61;
            color: #161616;
            font-weight: 600;
        }

        /* --- Mobile (≤640px) -------------------------------------------
           The grids are already auto-fit, so phones mostly collapse to one
           column on their own. What breaks are the FIXED-width bar labels
           and counts (funnel rows overflow a 390px screen) and side-by-side
           donuts — stack those instead. The sessions table keeps its width
           and scrolls inside .table-card (overflow-x is already set). */
        @media (max-width: 640px) {
            body { padding: 20px 12px; }
            .header h1 { font-size: 24px; }
            .header-row { flex-wrap: wrap; gap: 12px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .chart-card { padding: 16px; }
            .table-card { padding: 16px; }
            /* Bar rows: label moves ABOVE its bar (full row), the count
               stays beside the track. JS emits inline widths on some
               labels/counts, hence the !important overrides. */
            .bar-row { flex-wrap: wrap; row-gap: 4px; }
            .bar-label { width: 100% !important; text-align: left; }
            .bar-track { flex: 1 1 auto; }
            .bar-count { width: auto !important; white-space: nowrap; }
            .donut-container { flex-direction: column; align-items: flex-start; gap: 16px; }
            /* Wide tables scroll inside their card rather than the page. */
            table { min-width: 560px; }

            /* Capture Timeline: instead of a 10-column table squeezed onto a
               phone, each row becomes a stacked CARD — label:value lines via
               td data-labels. Cluster headers stay single summary lines. */
            #tab-timeline table { min-width: 0; }
            #tab-timeline thead { display: none; }
            #tab-timeline table, #tab-timeline tbody,
            #tab-timeline tr, #tab-timeline td { display: block; width: 100%; }
            #tab-timeline tr {
                border: 1px solid #222;
                border-radius: 12px;
                padding: 10px 12px;
                margin-bottom: 10px;
                background: #191919;
            }
            #tab-timeline td {
                border: none;
                padding: 3px 0;
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                gap: 12px;
                font-size: 13px;
            }
            #tab-timeline td::before {
                content: attr(data-label);
                color: #666;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 1px;
                flex-shrink: 0;
            }
            #tab-timeline tr.cluster-header td { display: block; }

            /* Expanded cluster = one continuous card: the header keeps only
               its top corners and sticks to the viewport top; children glue
               underneath with no gaps; the last child closes the card. */
            #tab-timeline tr.cluster-header.open {
                border-radius: 12px 12px 0 0;
                margin-bottom: 0;
                border-bottom: none;
                border-left: 2px solid #ED9B61;
                background: #1c1c1c;
                position: sticky; top: 0; z-index: 5;
            }
            #tab-timeline tr.cluster-row {
                border-radius: 0;
                margin-bottom: 0;
                border-top: none;
                border-left: 2px solid #ED9B61;
                background: #141414;
            }
            #tab-timeline tr.cluster-row:has(+ tr:not(.cluster-row)),
            #tab-timeline tr.cluster-row:last-child {
                border-radius: 0 0 12px 12px;
                margin-bottom: 10px;
            }
        }
        /* Capture Timeline: clickable rows + detail modal */
        #tab-timeline tbody tr.tl-click { cursor: pointer; }
        #tab-timeline tbody tr.tl-click:hover { background: #1d1d1d; }
        .tl-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .tl-modal {
            background: #191919; border: 1px solid #2e2e2e; border-radius: 16px;
            width: 100%; max-width: 440px; max-height: 85vh; overflow-y: auto;
            padding: 20px 22px; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .tl-modal h4 { margin: 0 0 6px; font-size: 16px; color: #eee; display: flex; align-items: center; gap: 8px; }
        .tl-modal-sub { color: #777; font-size: 12px; margin-bottom: 14px; }
        .tl-modal-close {
            float: right; background: #242424; border: none; color: #aaa;
            width: 30px; height: 30px; border-radius: 15px; font-size: 14px; cursor: pointer;
        }
        .tl-modal-close:hover { background: #2e2e2e; color: #fff; }
        .tl-detail-row {
            display: flex; justify-content: space-between; gap: 16px;
            padding: 9px 0; border-bottom: 1px solid #222;
            font-size: 13px; color: #888;
        }
        .tl-detail-row:last-child { border-bottom: none; }
        .tl-detail-row strong { color: #ddd; font-weight: 500; text-align: right; word-break: break-word; }
        .tl-steps { margin: 4px 0 12px; padding: 10px 14px; background: #131313; border-radius: 10px; }
        .tl-step { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 13px; color: #ccc; }
        .tl-step-dot { width: 8px; height: 8px; border-radius: 4px; background: #6bba6b; flex: none; }
        .tl-step-ts { margin-left: auto; color: #666; font-size: 12px; font-variant-numeric: tabular-nums; }
        @media (max-width: 640px) {
            /* Bottom-sheet feel on phones */
            .tl-modal-overlay { align-items: flex-end; padding: 0; }
            .tl-modal { border-radius: 16px 16px 0 0; max-width: none; max-height: 88vh; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <div>
                <h1>Kaart<span>je</span> Dashboard</h1>
                <p id="subtitle">Loading...</p>
            </div>
            <div class="header-controls">
                <label class="toggle">
                    <input type="checkbox" id="internal-toggle">
                    Show internal &amp; review
                </label>
                <button class="refresh-btn" onclick="fetchData()">Refresh</button>
            </div>
        </div>
    </div>

    <div id="content">
        <div class="loading">Loading data</div>
    </div>

    <script>
        const ENDPOINT = 'https://script.google.com/macros/s/AKfycbxB7YD_JPm1_iKDFXAMKojC8M_MCFqmzO0kVn8RIB0EOvXG4j5mTbev5FurUTb6L3hW9A/exec';

        // Cached response so toggling "Show internal" re-renders without a
        // second network round-trip.
        let cachedRows = null;
        let cachedFunnelRows = null;
        let cachedFunnelSummary = null;

        async function fetchData() {
            try {
                const res = await fetch(ENDPOINT);
                const json = await res.json();
                // New script returns funnelRows + funnelSummary; old script
                // returns neither. funnelRows is what lets us recompute the
                // summary client-side when the internal toggle flips.
                if (json.status === 'ok' && json.rows.length > 1) {
                    cachedRows = json.rows;
                    cachedFunnelRows = json.funnelRows || null;
                    cachedFunnelSummary = json.funnelSummary || null;
                    renderDashboard(cachedRows, cachedFunnelRows, cachedFunnelSummary);
                } else {
                    document.getElementById('content').innerHTML = '<div class="loading">No data yet — scan some cards!</div>';
                    document.getElementById('subtitle').textContent = 'No captures recorded';
                }
            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="loading">Error loading data: ${err.message}</div>`;
            }
        }

        // Compute median time between consecutive funnel steps, plus
        // end-to-end median for fully completed sessions. Uses the same
        // showInternal filter as summarizeFunnelClient so durations and counts
        // stay consistent.
        //
        // Caveat: timestamps are set server-side when each POST lands, so
        // per-step durations carry network-latency noise. Medians across many
        // sessions damp it; treat as approximate.
        function computeStepDurationsClient(rows) {
            const empty = { transitions: {}, endToEnd: null };
            if (!rows || rows.length < 2) return empty;

            const header = rows[0];
            const tsCol = header.indexOf('timestamp');
            const sessionCol = header.indexOf('sessionId');
            const stepCol = header.indexOf('step');
            const deviceCol = header.indexOf('deviceId');
            if (tsCol < 0 || sessionCol < 0 || stepCol < 0) return empty;

            // Group rows into sessions, capturing the earliest timestamp per
            // step (in case the same step is logged twice within one session).
            const sessions = new Map();
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!showInternal && deviceCol >= 0 && isFilteredDevice(row[deviceCol])) continue;
                const sid = row[sessionCol];
                const step = row[stepCol];
                const ts = row[tsCol];
                if (!sid || !step || !ts) continue;
                const ms = (ts instanceof Date) ? ts.getTime() : new Date(ts).getTime();
                if (Number.isNaN(ms)) continue;
                if (!sessions.has(sid)) sessions.set(sid, {});
                const stepFirstTs = sessions.get(sid);
                if (stepFirstTs[step] == null || ms < stepFirstTs[step]) {
                    stepFirstTs[step] = ms;
                }
            }

            const stepOrder = ['started', 'typeChosen', 'outsideScanned', 'previewReached', 'categorizeReached', 'saved'];
            const transitionTimes = {}; // key 'a→b' → [durations in ms]
            const endToEndTimes = [];

            for (const stepFirstTs of sessions.values()) {
                for (let i = 1; i < stepOrder.length; i++) {
                    const prev = stepOrder[i - 1];
                    const curr = stepOrder[i];
                    if (stepFirstTs[prev] != null && stepFirstTs[curr] != null) {
                        const dt = stepFirstTs[curr] - stepFirstTs[prev];
                        if (dt >= 0) {
                            const key = `${prev}→${curr}`;
                            (transitionTimes[key] ||= []).push(dt);
                        }
                    }
                }
                if (stepFirstTs.started != null && stepFirstTs.saved != null) {
                    const dt = stepFirstTs.saved - stepFirstTs.started;
                    if (dt >= 0) endToEndTimes.push(dt);
                }
            }

            const transitions = {};
            Object.entries(transitionTimes).forEach(([k, vals]) => {
                transitions[k] = { medianMs: median(vals), n: vals.length };
            });

            return {
                transitions,
                endToEnd: endToEndTimes.length
                    ? { medianMs: median(endToEndTimes), n: endToEndTimes.length }
                    : null
            };
        }

        function median(arr) {
            if (!arr.length) return null;
            const sorted = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        }

        // One row per started session: where it ended (last step reached) and
        // how long it took (started → last step). Used for the "Capture
        // Sessions" table — gives raw visibility into individual flows that
        // the aggregate funnel hides. Same internal-device filter as the
        // other funnel functions.
        function computeSessionsListClient(rows) {
            if (!rows || rows.length < 2) return [];

            const header = rows[0];
            const tsCol = header.indexOf('timestamp');
            const sessionCol = header.indexOf('sessionId');
            const stepCol = header.indexOf('step');
            const deviceCol = header.indexOf('deviceId');
            const modelCol = header.indexOf('deviceModel');
            const abandonedCol = header.indexOf('abandonedAt');
            if (tsCol < 0 || sessionCol < 0 || stepCol < 0) return [];

            const stepOrder = ['started', 'typeChosen', 'outsideScanned', 'previewReached', 'categorizeReached', 'saved'];
            const stepRank = Object.fromEntries(stepOrder.map((s, i) => [s, i]));
            const verCol = header.indexOf('appVersion');
            const countryCol = header.indexOf('country');
            const tzCol = header.indexOf('timezone');

            // Group rows by sessionId, tracking earliest timestamp per step
            // plus the device + any abandonedAt marker.
            const sessions = new Map();
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!showInternal && deviceCol >= 0 && isFilteredDevice(row[deviceCol])) continue;
                const sid = row[sessionCol];
                const step = row[stepCol];
                const ts = row[tsCol];
                if (!sid || !step || !ts) continue;
                const ms = (ts instanceof Date) ? ts.getTime() : new Date(ts).getTime();
                if (Number.isNaN(ms)) continue;

                if (!sessions.has(sid)) {
                    sessions.set(sid, {
                        sessionId: sid,
                        deviceId: deviceCol >= 0 ? row[deviceCol] : null,
                        deviceModel: modelCol >= 0 ? row[modelCol] : null,
                        appVersion: null,
                        country: null,
                        timezone: null,
                        stepTs: {},
                        abandonedAt: null
                    });
                }
                const s = sessions.get(sid);
                if (s.stepTs[step] == null || ms < s.stepTs[step]) s.stepTs[step] = ms;
                // First non-empty deviceModel wins — every row in a session
                // should have the same one anyway, but earlier rows are more
                // likely to be filled if the column was added recently.
                if (modelCol >= 0 && row[modelCol] && !s.deviceModel) {
                    s.deviceModel = row[modelCol];
                }
                if (abandonedCol >= 0 && row[abandonedCol] && !s.abandonedAt) {
                    s.abandonedAt = row[abandonedCol];
                }
                if (verCol >= 0 && row[verCol] && !s.appVersion) {
                    s.appVersion = row[verCol];
                }
                if (countryCol >= 0 && row[countryCol] && !s.country) {
                    s.country = row[countryCol];
                }
                if (tzCol >= 0 && row[tzCol] && !s.timezone) {
                    s.timezone = row[tzCol];
                }
            }

            // Only include sessions that actually started — the dashboard's
            // funnel uses "Started" as the denominator, this matches.
            const out = [];
            for (const s of sessions.values()) {
                const startedAt = s.stepTs.started;
                if (startedAt == null) continue;

                // Last step reached = the step with highest rank that has a ts.
                let lastStep = 'started';
                let lastTs = startedAt;
                for (const step of stepOrder) {
                    if (s.stepTs[step] != null && stepRank[step] >= stepRank[lastStep]) {
                        lastStep = step;
                        lastTs = s.stepTs[step];
                    }
                }
                out.push({
                    sessionId: s.sessionId,
                    deviceId: s.deviceId,
                    deviceModel: s.deviceModel,
                    appVersion: s.appVersion,
                    country: s.country,
                    timezone: s.timezone,
                    startedAt,
                    lastStep,
                    lastTs,
                    durationMs: lastTs - startedAt,
                    completed: lastStep === 'saved',
                    abandonedAt: s.abandonedAt,
                    stepTs: s.stepTs
                });
            }

            // Most recent first.
            out.sort((a, b) => b.startedAt - a.startedAt);
            return out;
        }

        function formatDuration(ms) {
            if (ms == null) return '';
            if (ms < 1000) return `${Math.round(ms)}ms`;
            const s = ms / 1000;
            if (s < 60) return `${s.toFixed(1)}s`;
            const m = Math.floor(s / 60);
            const rem = Math.round(s - m * 60);
            return rem ? `${m}m ${rem}s` : `${m}m`;
        }

        // Client-side mirror of the Apps Script's summarizeFunnel(), with an
        // extra deviceId filter so the "Show internal" toggle can recompute
        // the funnel without refetching. Falls back gracefully if the sheet
        // has no header row or is missing expected columns.
        function summarizeFunnelClient(rows) {
            const perStep = {};
            const abandonedAt = {};
            if (!rows || rows.length < 2) return { perStep, abandonedAt };

            const header = rows[0];
            const stepCol = header.indexOf('step');
            const abandonedCol = header.indexOf('abandonedAt');
            const deviceCol = header.indexOf('deviceId');

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!showInternal && deviceCol >= 0 && isFilteredDevice(row[deviceCol])) continue;

                const step = row[stepCol];
                if (step) perStep[step] = (perStep[step] || 0) + 1;

                const at = row[abandonedCol];
                if (at) abandonedAt[at] = (abandonedAt[at] || 0) + 1;
            }
            return { perStep, abandonedAt };
        }

        // Device-level rollup for the onboarding/activation funnel: which
        // steps each DEVICE ever reached (across all its sessions). Returns
        // step → Set of deviceIds, so the funnel counts distinct devices, not
        // rows. The 'emptyStateShown' rows (logged with no sessionId when the
        // first-run empty state appears) anchor the denominator.
        function summarizeOnboardingDevices(rows) {
            const stepDevices = {};
            if (!rows || rows.length < 2) return stepDevices;
            const header = rows[0];
            const stepCol = header.indexOf('step');
            const deviceCol = header.indexOf('deviceId');
            if (stepCol < 0 || deviceCol < 0) return stepDevices;
            for (let i = 1; i < rows.length; i++) {
                const dev = rows[i][deviceCol];
                const step = rows[i][stepCol];
                if (!dev || !step) continue;
                if (!showInternal && isFilteredDevice(dev)) continue;
                (stepDevices[step] = stepDevices[step] || new Set()).add(dev);
            }
            return stepDevices;
        }

        // Usage / friction / monetization rollup over the NEW event rows
        // (appOpened, searchUsed, retakeOutside, paywallShown, purchased_*, …)
        // which ride the funnel_step pipeline as extra step names. For each
        // step: total row count, distinct devices, and distinct devices in
        // the trailing 7 days (timestamps are server-side arrival times).
        function summarizeUsage(rows) {
            const out = {};
            if (!rows || rows.length < 2) return out;
            const header = rows[0];
            const stepCol = header.indexOf('step');
            const deviceCol = header.indexOf('deviceId');
            const tsCol = header.indexOf('timestamp');
            if (stepCol < 0 || deviceCol < 0) return out;
            const cutoff = Date.now() - 7 * 24 * 3600 * 1000;
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const dev = row[deviceCol];
                const step = row[stepCol];
                if (!dev || !step) continue;
                if (!showInternal && isFilteredDevice(dev)) continue;
                const e = (out[step] = out[step] || { count: 0, devices: new Set(), devices7d: new Set() });
                e.count++;
                e.devices.add(dev);
                const ts = row[tsCol];
                const ms = (ts instanceof Date) ? ts.getTime() : new Date(ts).getTime();
                if (!Number.isNaN(ms) && ms >= cutoff) e.devices7d.add(dev);
            }
            return out;
        }

        // --- Section renderers for the usage rollup ---------------------

        const usageStat = (u, key) => u[key] || { count: 0, devices: new Set(), devices7d: new Set() };

        // Engagement: is the app being USED between scans? Device-level
        // pulses (each throttled app-side to one row/day/device).
        function renderEngagementSection(u) {
            const opened = usageStat(u, 'appOpened');
            if (opened.count === 0) return '';  // no data until builds with the pulse ship
            const rows = [
                ['Active devices (7d)', usageStat(u, 'appOpened').devices7d.size, 'opened the app'],
                ['Searchers (7d)',      usageStat(u, 'searchUsed').devices7d.size, 'used search'],
                ['Card viewers (7d)',   usageStat(u, 'cardOpened').devices7d.size, 'opened a card'],
                ['Detail reveals (7d)', usageStat(u, 'detailsRevealed').devices7d.size, 'pulled up details'],
                ['Editors (7d)',        usageStat(u, 'cardEdited').devices7d.size, 'edited a card'],
            ];
            let html = '<div class="chart-card" style="margin-bottom:24px">';
            html += '<h3>Engagement<span style="color:#555;font-weight:400"> · distinct devices, trailing 7 days</span></h3>';
            html += '<div class="stats-grid">';
            rows.forEach(([label, value, sub]) => { html += statCard(label, value, sub); });
            html += '</div>';
            const creations = [
                ['Moments created', usageStat(u, 'momentCreated').count],
                ['Categories created', usageStat(u, 'categoryCreated').count],
                ['Cards deleted', usageStat(u, 'cardDeleted').count],
            ];
            html += '<div style="margin-top:12px;display:flex;gap:24px;flex-wrap:wrap">';
            creations.forEach(([label, n]) => {
                html += `<span style="font-size:13px;color:#888">${label}: <span style="color:#fff;font-weight:600">${n}</span> all-time</span>`;
            });
            html += '</div></div>';
            return html;
        }

        // Friction: where do people struggle? Retakes = camera trouble
        // (which side tells where); backsteps = flow confusion. Rates are
        // per started scan session so they stay comparable as volume grows.
        function renderFrictionSection(u, funnelSummary) {
            const retakesOut = usageStat(u, 'retakeOutside').count;
            const retakesIn = usageStat(u, 'retakeInside').count;
            const backsteps = usageStat(u, 'scanBackstep').count;
            if (retakesOut + retakesIn + backsteps === 0) return '';
            const started = (funnelSummary && funnelSummary.perStep && funnelSummary.perStep.started) || 0;
            const per = (n) => started ? (n / started).toFixed(2) : '—';
            let html = '<div class="chart-card" style="margin-bottom:24px">';
            html += '<h3>Friction<span style="color:#555;font-weight:400"> · capture retakes & backtracking (drop-off lives in the Scan Funnel)</span></h3>';
            html += '<div class="stats-grid">';
            html += statCard('Outside retakes', retakesOut, `${per(retakesOut)} per started scan`);
            html += statCard('Inside retakes', retakesIn, `${per(retakesIn)} per started scan`);
            html += statCard('Backsteps', backsteps, `${per(backsteps)} per started scan`);
            html += '</div></div>';
            return html;
        }

        // Monetization: paywall exposure → purchase, by tier. Counts distinct
        // devices on both sides so repeated paywall views don't dilute.
        function renderMonetizationSection(u) {
            const seen = usageStat(u, 'paywallShown').devices;
            const t20 = usageStat(u, 'purchased_tier20').devices;
            const t100 = usageStat(u, 'purchased_tier100').devices;
            const unl = usageStat(u, 'purchased_unlimited').devices;
            const buyers = new Set([...t20, ...t100, ...unl]);
            if (seen.size === 0 && buyers.size === 0) return '';
            const conv = seen.size ? (buyers.size / seen.size * 100).toFixed(1) : '—';
            let html = '<div class="chart-card" style="margin-bottom:24px">';
            html += '<h3>Monetization<span style="color:#555;font-weight:400"> · distinct devices</span></h3>';
            html += '<div class="stats-grid">';
            html += statCard('Saw the paywall', seen.size, 'all-time devices');
            html += statCard('Purchased', buyers.size, `${conv}% of paywall viewers`);
            html += statCard('Up to 20', t20.size, 'tier purchases');
            html += statCard('Up to 100', t100.size, 'tier purchases');
            html += statCard('Unlimited', unl.size, 'tier purchases');
            html += '</div></div>';
            return html;
        }

        const INTERNAL_DEVICES = new Set([
            '103DF45F-718F-475C-A0AF-BC0D50CD4ECB',
            '693AEA1A-4BAE-46A9-B3E3-FC9FA2C202A3',
            '6F46307B-BD94-4DD7-9B1B-1E27306AB57A',
            'C535355A-B682-46A5-B4FE-722B71B8E122',
            'DEPLOY-TEST-DEVICE'
        ]);

        // Likely Apple App Review / beta-review infrastructure, recomputed
        // from raw data on every render. Fingerprint (verified against the
        // 2026-05→07 data): the device never saved a card, was active on a
        // single calendar day, and its locale points at Apple's review farms
        // (CN region, or Asia/Shanghai / America/Los_Angeles timezone).
        // Deliberately NOT country-based alone: a real churned user in the
        // actual audience (e.g. Toronto, one visit, no save) must keep
        // counting in the funnel — drop-off measurement is the point.
        let REVIEW_DEVICES = new Set();
        function computeReviewDevices(rows, funnelRows) {
            const saved = new Set();
            if (rows && rows.length > 1) {
                const dI = rows[0].indexOf('deviceId');
                for (let i = 1; i < rows.length; i++) saved.add(rows[i][dI]);
            }
            const profile = {};
            if (funnelRows && funnelRows.length > 1) {
                const h = funnelRows[0];
                const dI = h.indexOf('deviceId'), tI = h.indexOf('timestamp'),
                      cI = h.indexOf('country'), tzI = h.indexOf('timezone');
                for (let i = 1; i < funnelRows.length; i++) {
                    const r = funnelRows[i], id = r[dI];
                    if (!id || saved.has(id)) continue;
                    const p = profile[id] || (profile[id] = { days: new Set(), reviewLocale: false });
                    if (tI >= 0 && r[tI]) p.days.add(String(r[tI]).slice(0, 10));
                    const c = cI >= 0 ? r[cI] : '', tz = tzI >= 0 ? r[tzI] : '';
                    if (c === 'CN' || tz === 'Asia/Shanghai' || tz === 'America/Los_Angeles') p.reviewLocale = true;
                }
            }
            const set = new Set();
            Object.entries(profile).forEach(([id, p]) => {
                if (p.reviewLocale && p.days.size <= 1) set.add(id);
            });
            return set;
        }

        // Single predicate for every "hide this device?" check so internal
        // and review filtering can never drift apart between sections.
        function isFilteredDevice(id) {
            return INTERNAL_DEVICES.has(id) || REVIEW_DEVICES.has(id);
        }

        // Active dashboard tab, persisted across reloads.
        let activeTab = localStorage.getItem('dashTab') || 'overview';
        function switchTab(name) {
            activeTab = name;
            localStorage.setItem('dashTab', name);
            const ov = document.getElementById('tab-overview');
            const tl = document.getElementById('tab-timeline');
            if (ov) ov.style.display = name === 'overview' ? '' : 'none';
            if (tl) tl.style.display = name === 'timeline' ? '' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.tab === name));
        }

        // "Show internal" toggle state, persisted so a reload respects the
        // previous choice. Read eagerly so the checkbox reflects it on init.
        let showInternal = localStorage.getItem('showInternal') === 'true';

        function renderDashboard(rows, funnelRows, funnelSummary) {
            REVIEW_DEVICES = computeReviewDevices(rows, funnelRows);
            const headers = rows[0];
            const allData = rows.slice(1).map(row => {
                const obj = {};
                headers.forEach((h, i) => obj[h] = row[i]);
                return obj;
            });

            // If we have raw funnel rows, recompute the summary client-side
            // so it respects the internal-devices filter. Fall back to the
            // server's pre-computed summary only if raw rows aren't available.
            const effectiveFunnelSummary = funnelRows
                ? summarizeFunnelClient(funnelRows)
                : funnelSummary;
            const stepDurations = funnelRows
                ? computeStepDurationsClient(funnelRows)
                : { transitions: {}, endToEnd: null };
            const sessionsList = funnelRows
                ? computeSessionsListClient(funnelRows)
                : [];

            // When internal is hidden, it's hidden everywhere (stats, charts,
            // table) so nothing can accidentally leak test captures into a
            // public view. When shown, internal rows appear in the table
            // with a faded INTERNAL badge but the numbers reflect the full set.
            const visible = showInternal
                ? allData
                : allData.filter(d => !isFilteredDevice(d['deviceId']));
            const data = visible;
            const tableData = visible;

            // Stats
            const total = data.length;
            const devices = new Set(data.map(d => d['deviceId'])).size;
            const dieCuts = data.filter(d => d['isDieCut'] === true || d['isDieCut'] === 'TRUE').length;
            const withFrom = data.filter(d => d['hasFromPerson'] === true || d['hasFromPerson'] === 'TRUE').length;

            // Card types
            const types = {};
            data.forEach(d => {
                const t = d['cardType'] || 'unknown';
                types[t] = (types[t] || 0) + 1;
            });

            // Categories
            const categories = {};
            data.forEach(d => {
                const c = d['category'] || 'Uncategorized';
                if (c) categories[c] = (categories[c] || 0) + 1;
            });

            // Timeline (by day)
            const byDay = {};
            data.forEach(d => {
                const ts = d['timestamp'];
                // Apps Script serializes Date cells as ISO strings, but sheets
                // may also return them as Date objects. Normalize both.
                const dayStr = ts instanceof Date
                    ? ts.toISOString().split('T')[0]
                    : (typeof ts === 'string' ? ts.split('T')[0] : 'unknown');
                byDay[dayStr] = (byDay[dayStr] || 0) + 1;
            });
            const sortedDays = Object.keys(byDay).sort();
            // Show last 14 days max
            const recentDays = sortedDays.slice(-14);

            // Per-device profile — union of BOTH sheets. Capture rows only
            // cover devices that saved a card; funnel rows also carry model /
            // country / timezone for devices that installed or tried a scan
            // but never saved. One entry per deviceId so a prolific tester
            // counts once, and funnel rows get the internal filter that
            // capture rows already had.
            const deviceInfo = {};
            const noteDevice = (id, model, country, tz) => {
                if (!id) return;
                if (!showInternal && isFilteredDevice(id)) return;
                const e = deviceInfo[id] || (deviceInfo[id] = {});
                if (model && !e.model) e.model = model;
                if (country && !e.country) e.country = country;
                if (tz && !e.tz) e.tz = tz;
            };
            data.forEach(d => noteDevice(d['deviceId'], d['deviceModel'], d['country'], d['timezone']));
            if (funnelRows && funnelRows.length > 1) {
                const fh = funnelRows[0];
                const dI = fh.indexOf('deviceId'), mI = fh.indexOf('deviceModel'),
                      cI = fh.indexOf('country'), tzI = fh.indexOf('timezone');
                for (let i = 1; i < funnelRows.length; i++) {
                    const r = funnelRows[i];
                    noteDevice(r[dI], mI >= 0 ? r[mI] : null, cI >= 0 ? r[cI] : null, tzI >= 0 ? r[tzI] : null);
                }
            }

            // Device models — one vote per device, not per capture
            const models = {};
            Object.values(deviceInfo).forEach(e => {
                const m = e.model || 'unknown';
                models[m] = (models[m] || 0) + 1;
            });

            const typeColors = {
                vertical: '#6bba6b',
                horizontal: '#6b8bba',
                postcard: '#ba6bba'
            };

            const catColors = ['#ED9B61', '#6bba6b', '#6b8bba', '#ba6bba', '#ba6b6b', '#6bbaba', '#baba6b', '#9b6bba'];

            document.getElementById('subtitle').textContent = `${total} cards captured across ${devices} device${devices !== 1 ? 's' : ''}`;

            let html = '';

            // Stat cards
            html += '<div class="stats-grid">';
            html += statCard('Total Cards', total, 'All time');
            html += statCard('Devices', devices, 'Unique');
            html += statCard('Die-Cut', dieCuts, `${total ? Math.round(dieCuts/total*100) : 0}% of total`);
            html += statCard('With Sender', withFrom, `${total ? Math.round(withFrom/total*100) : 0}% tagged`);
            html += '</div>';

            // Onboarding (activation) funnel — device-level, from the first-run
            // empty state through to a first saved card. The headline question,
            // so it sits above the session-level scan funnel. Hidden until the
            // 'emptyStateShown' event has data.
            if (funnelRows) {
                html += renderOnboardingFunnel(summarizeOnboardingDevices(funnelRows));
            }

            // Usage / friction / monetization — built from the new pulse +
            // friction events riding the funnel pipeline. Each section hides
            // itself until builds that log its events ship data.
            if (funnelRows) {
                const usage = summarizeUsage(funnelRows);
                html += renderEngagementSection(usage);
                html += renderFrictionSection(usage, effectiveFunnelSummary);
                html += renderMonetizationSection(usage);
            }

            // Funnel section (only if the new Apps Script has served data)
            if (effectiveFunnelSummary && effectiveFunnelSummary.perStep) {
                html += renderFunnelSection(effectiveFunnelSummary, stepDurations);
            }

            // Unified capture timeline — combines the per-session funnel data
            // (every started capture + where it ended + duration) with the
            // per-card capture metadata (type/category/die-cut/from). One
            // row per session when funnel data exists; orphan capture rows
            // (saved before FunnelSteps logging existed, or saved without a
            // matching session) are appended so nothing's hidden.
            //
            // FunnelSteps rows only carry deviceId, not deviceModel — build
            // a deviceId → most-recent-model map from the Captures sheet as
            // a fallback for older sessions.
            const deviceModels = {};
            allData.forEach(d => {
                const id = d['deviceId'];
                const model = d['deviceModel'];
                if (id && model) deviceModels[id] = model;
            });
            const timelineHtml = renderTimeline(sessionsList, tableData, deviceModels);

            // Charts
            html += '<div class="charts-grid">';

            // Card type donut
            html += '<div class="chart-card">';
            html += '<h3>Card Types</h3>';
            html += renderDonut(types, typeColors);
            html += '</div>';

            // Categories bar chart
            html += '<div class="chart-card">';
            html += '<h3>Categories</h3>';
            const sortedCats = Object.entries(categories).sort((a, b) => b[1] - a[1]);
            const maxCat = sortedCats.length ? sortedCats[0][1] : 1;
            html += '<div class="bar-chart">';
            sortedCats.forEach(([name, count], i) => {
                const pct = (count / maxCat * 100).toFixed(1);
                const color = catColors[i % catColors.length];
                html += `<div class="bar-row">
                    <div class="bar-label">${name}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`;
            });
            html += '</div></div>';

            // Devices
            html += '<div class="chart-card">';
            html += '<h3>Device Models <span style="color:#555;font-weight:400;font-size:13px">· distinct devices</span></h3>';
            // Map internal model IDs to friendly names and merge duplicates
            const friendlyModels = {};
            Object.entries(models).forEach(([model, count]) => {
                const name = deviceName(model);
                friendlyModels[name] = (friendlyModels[name] || 0) + count;
            });
            const sortedModels = Object.entries(friendlyModels).sort((a, b) => b[1] - a[1]);
            const maxModel = sortedModels.length ? sortedModels[0][1] : 1;
            html += '<div class="bar-chart">';
            sortedModels.forEach(([name, count]) => {
                const pct = (count / maxModel * 100).toFixed(1);
                html += `<div class="bar-row">
                    <div class="bar-label" style="width:120px">${name}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#ED9B61"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`;
            });
            html += '</div></div>';

            // Locations — derived from device locale + timezone (no GPS,
            // no permission). Country = ISO region from iOS Settings,
            // timezone = IANA identifier. Counts DISTINCT DEVICES from the
            // deviceInfo union above (captures + funnel), so devices that
            // never saved a card still show up and heavy testers count once.
            // Only renders if at least one device carries either field.
            const countries = {};
            const timezones = {};
            Object.values(deviceInfo).forEach(e => {
                if (e.country) countries[e.country] = (countries[e.country] || 0) + 1;
                if (e.tz) timezones[e.tz] = (timezones[e.tz] || 0) + 1;
            });
            const hasLocation = Object.keys(countries).length || Object.keys(timezones).length;
            if (hasLocation) {
                html += '<div class="chart-card">';
                html += '<h3>Locations <span style="color:#555;font-weight:400;font-size:13px">· distinct devices, by locale + timezone</span></h3>';

                // Countries: friendly name + flag emoji
                const sortedCountries = Object.entries(countries).sort((a, b) => b[1] - a[1]);
                const maxCountry = sortedCountries.length ? sortedCountries[0][1] : 1;
                html += '<div class="bar-chart" style="margin-bottom:16px">';
                sortedCountries.forEach(([code, count]) => {
                    const pct = (count / maxCountry * 100).toFixed(1);
                    const flag = countryFlag(code);
                    const name = countryName(code);
                    html += `<div class="bar-row">
                        <div class="bar-label" style="width:160px">${flag} ${name} <span style="color:#555">${code}</span></div>
                        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#6b8bba"></div></div>
                        <div class="bar-count">${count}</div>
                    </div>`;
                });
                html += '</div>';

                // Timezones: secondary, smaller list
                const sortedTzs = Object.entries(timezones).sort((a, b) => b[1] - a[1]).slice(0, 8);
                if (sortedTzs.length) {
                    html += '<div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Timezones</div>';
                    const maxTz = sortedTzs[0][1];
                    html += '<div class="bar-chart">';
                    sortedTzs.forEach(([tz, count]) => {
                        const pct = (count / maxTz * 100).toFixed(1);
                        // Drop the IANA continent prefix to save horizontal
                        // space — "America/Toronto" → "Toronto".
                        const short = tz.includes('/') ? tz.split('/').slice(1).join('/').replace(/_/g, ' ') : tz;
                        html += `<div class="bar-row">
                            <div class="bar-label" style="width:160px;font-size:12px">${short}</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#6bba6b;opacity:0.6"></div></div>
                            <div class="bar-count">${count}</div>
                        </div>`;
                    });
                    html += '</div>';
                }

                html += '</div>';
            }

            html += '</div>';

            // Timeline — full width
            html += '<div class="chart-card" style="max-width:1200px;margin:0 auto 32px">';
            html += '<h3>Captures Over Time</h3>';
            const maxDay = Math.max(...recentDays.map(d => byDay[d]));
            html += '<div class="timeline-chart">';
            recentDays.forEach(day => {
                const count = byDay[day];
                const pct = (count / maxDay * 100).toFixed(1);
                const label = day.slice(5); // MM-DD
                html += `<div class="timeline-bar-wrapper">
                    <div class="timeline-bar" style="height:${pct}%" title="${day}: ${count} cards"></div>
                    <div class="timeline-label">${label}</div>
                </div>`;
            });
            html += '</div></div>';

            // Two tabs: Overview (everything above) and the Capture
            // Timeline (the long forensic table). Active tab persists.
            const tabBar = `<div class="tab-bar">
                <button class="tab-btn" data-tab="overview" onclick="switchTab('overview')">Overview</button>
                <button class="tab-btn" data-tab="timeline" onclick="switchTab('timeline')">Capture timeline</button>
            </div>`;
            document.getElementById('content').innerHTML =
                tabBar
                + `<div id="tab-overview">${html}</div>`
                + `<div id="tab-timeline" style="display:none">${timelineHtml}</div>`;
            switchTab(activeTab);
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            let relative;
            if (mins < 1) relative = 'Just now';
            else if (mins < 60) relative = `${mins}m ago`;
            else if (hours < 24) relative = `${hours}h ago`;
            else if (days === 1) relative = 'Yesterday';
            else if (days < 7) relative = `${days}d ago`;
            else relative = null;

            const timeStr = date.toLocaleString(undefined, {
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });

            return relative ? `${relative} <span style="color:#555">${timeStr}</span>` : timeStr;
        }

        function statCard(label, value, sub) {
            return `<div class="stat-card">
                <div class="stat-label">${label}</div>
                <div class="stat-value">${value}</div>
                <div class="stat-sub">${sub}</div>
            </div>`;
        }

        // Renders the scan-funnel section: one bar per step scaled to the
        // number of sessions that started, plus a drop-off chart showing where
        // abandoners bailed. The step order matches AnalyticsService.FunnelStep
        // in the iOS app.
        //
        // Per-step duration labels show median time spent reaching that step
        // from the previous one (computed client-side from session timestamps).
        // Onboarding / activation funnel — DEVICE-level, anchored at the
        // first-run empty state. Answers "of people who saw onboarding, how
        // many made it through each scan step to a first saved card?" This is
        // distinct from the session-level Scan Funnel below (which counts every
        // scan attempt, by anyone). Renders nothing until the 'emptyStateShown'
        // event has data (it ships in the app build that logs it).
        function renderOnboardingFunnel(stepDevices) {
            const onboarded = stepDevices['emptyStateShown'];
            const N = onboarded ? onboarded.size : 0;
            if (N === 0) return '';

            const order = [
                { key: 'emptyStateShown',   label: 'Saw onboarding' },
                { key: 'started',           label: 'Opened scanner' },
                { key: 'outsideScanned',    label: 'Scanned outside' },
                { key: 'previewReached',    label: 'Reached preview' },
                { key: 'categorizeReached', label: 'Reached categorize' },
                { key: 'saved',             label: 'Saved first card' }
            ];

            // Distinct onboarded devices that also reached the given step.
            const countAt = (key) => {
                if (key === 'emptyStateShown') return N;
                const set = stepDevices[key];
                if (!set) return 0;
                let n = 0;
                set.forEach(d => { if (onboarded.has(d)) n++; });
                return n;
            };

            let html = '<div class="chart-card" style="margin-bottom:24px">';
            html += `<h3>Onboarding Funnel — ${N} new device${N === 1 ? '' : 's'}<span style="color:#555;font-weight:400"> · from the first-run empty state to a first saved card</span></h3>`;
            html += '<div class="bar-chart">';
            let prev = N;
            order.forEach((s, i) => {
                const count = countAt(s.key);
                const pct = N ? count / N * 100 : 0;
                const drop = prev ? (prev - count) / prev * 100 : 0;
                const dropLabel = i === 0 ? '' : `<span style="color:#666"> · −${drop.toFixed(0)}%</span>`;
                html += `<div class="bar-row">
                    <div class="bar-label" style="width:150px">${s.label}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:#ED9B61;opacity:${0.4 + pct / 200}"></div></div>
                    <div class="bar-count" style="width:120px">${count} <span style="color:#555">(${pct.toFixed(0)}%)</span>${dropLabel}</div>
                </div>`;
                prev = count;
            });
            html += '</div>';

            const conv = N ? countAt('saved') / N * 100 : 0;
            html += `<div style="margin-top:16px;padding-top:14px;border-top:1px solid #222;display:flex;justify-content:space-between;align-items:baseline">
                <span style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px">Onboarding → first card</span>
                <span style="font-size:24px;font-weight:700;color:#fff">${conv.toFixed(1)}%</span>
            </div>`;
            html += '</div>';
            return html;
        }

        function renderFunnelSection(summary, durations) {
            const stepOrder = [
                { key: 'started', label: 'Started' },
                { key: 'typeChosen', label: 'Type chosen' },
                { key: 'outsideScanned', label: 'Outside scanned' },
                { key: 'previewReached', label: 'Preview reached' },
                { key: 'categorizeReached', label: 'Categorize' },
                { key: 'saved', label: 'Saved' }
            ];

            const perStep = summary.perStep || {};
            const abandonedAt = summary.abandonedAt || {};
            const transitions = (durations && durations.transitions) || {};
            const endToEnd = durations && durations.endToEnd;
            const started = perStep.started || 0;

            if (started === 0) return '';

            let html = '<div class="charts-grid" style="grid-template-columns:1fr 1fr">';

            // Left: the funnel itself
            html += '<div class="chart-card">';
            html += `<h3>Scan Funnel — ${started} session${started === 1 ? '' : 's'}<span style="color:#555;font-weight:400"> · median time per step</span></h3>`;
            html += '<div class="bar-chart">';
            let prevCount = started;
            stepOrder.forEach((s, i) => {
                const count = perStep[s.key] || 0;
                const pctOfStart = started ? (count / started * 100) : 0;
                const dropFromPrev = prevCount ? ((prevCount - count) / prevCount * 100) : 0;
                // Color fades from brand orange to a deeper tone as the
                // funnel narrows — makes the drop-off visually obvious.
                const color = i === 0 ? '#ED9B61' : (count === 0 ? '#3a3a3a' : '#ED9B61');
                const dropLabel = i === 0 ? '' :
                    `<span style="color:#666"> · −${dropFromPrev.toFixed(0)}%</span>`;
                // Median time from previous step → this step (no label on
                // "Started" since there's no preceding step to time from).
                let timeLabel = '';
                if (i > 0) {
                    const t = transitions[`${stepOrder[i - 1].key}→${s.key}`];
                    if (t && t.medianMs != null) {
                        timeLabel = `<div style="font-size:11px;color:#666;margin-top:2px">+${formatDuration(t.medianMs)} <span style="color:#444">(n=${t.n})</span></div>`;
                    }
                }
                html += `<div class="bar-row">
                    <div class="bar-label" style="width:120px">${s.label}</div>
                    <div style="flex:1;display:flex;flex-direction:column;gap:0">
                        <div class="bar-track">
                            <div class="bar-fill" style="width:${pctOfStart.toFixed(1)}%;background:${color};opacity:${0.4 + (pctOfStart/200)}"></div>
                        </div>
                        ${timeLabel}
                    </div>
                    <div class="bar-count" style="width:90px">${count} <span style="color:#555">(${pctOfStart.toFixed(0)}%)</span>${dropLabel}</div>
                </div>`;
                prevCount = count;
            });
            html += '</div>';

            // Overall conversion rate, plus median end-to-end time for fully
            // completed sessions when we have it.
            const saved = perStep.saved || 0;
            const overall = started ? (saved / started * 100) : 0;
            const endToEndLabel = endToEnd && endToEnd.medianMs != null
                ? ` <span style="font-size:13px;font-weight:400;color:#888">· ${formatDuration(endToEnd.medianMs)} median</span>`
                : '';
            html += `<div style="margin-top:20px;padding-top:16px;border-top:1px solid #222;display:flex;justify-content:space-between;align-items:baseline">
                <span style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px">Overall completion</span>
                <span style="font-size:24px;font-weight:700;color:#fff">${overall.toFixed(1)}%${endToEndLabel}</span>
            </div>`;
            html += '</div>';

            // Right: drop-off chart — where abandoners bailed
            html += '<div class="chart-card">';
            const totalAbandoned = Object.values(abandonedAt).reduce((s, n) => s + n, 0);
            html += `<h3>Where Users Drop Off — ${totalAbandoned} abandoned</h3>`;

            if (totalAbandoned === 0) {
                html += '<div style="color:#555;font-size:13px;padding:12px 0">No abandoned sessions yet.</div>';
            } else {
                html += '<div class="bar-chart">';
                const dropOrder = stepOrder.slice(0, -1); // can't abandon from "saved"
                const maxDrop = Math.max(...dropOrder.map(s => abandonedAt[s.key] || 0), 1);
                dropOrder.forEach(s => {
                    const count = abandonedAt[s.key] || 0;
                    const pct = (count / maxDrop * 100).toFixed(1);
                    const shareOfAbandoned = totalAbandoned ? (count / totalAbandoned * 100) : 0;
                    html += `<div class="bar-row">
                        <div class="bar-label" style="width:120px">At ${s.label}</div>
                        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#ba6b6b"></div></div>
                        <div class="bar-count" style="width:70px">${count} <span style="color:#555">(${shareOfAbandoned.toFixed(0)}%)</span></div>
                    </div>`;
                });
                html += '</div>';
            }
            html += '</div>';

            html += '</div>'; // charts-grid

            return html;
        }

        // Unified capture timeline: every started session in chronological
        // order, enriched with the saved card's metadata when one exists.
        // Captures that have no matching session (older data, or saves
        // logged before FunnelSteps existed) are appended as "capture-only"
        // rows so the timeline stays complete.
        //
        // Match strategy: prefer sessionId (if Captures sheet carries one),
        // then fall back to deviceId + timestamp proximity (within 60s of
        // the session's last step). If neither matches, the saved-session
        // row just shows "—" for the per-card columns.
        function renderTimeline(sessions, captureRows, deviceModels) {
            sessions = sessions || [];
            captureRows = captureRows || [];
            deviceModels = deviceModels || {};
            tlDetails = [];

            const stepLabels = {
                started: 'Started',
                typeChosen: 'Type chosen',
                outsideScanned: 'Outside scanned',
                previewReached: 'Preview reached',
                categorizeReached: 'Categorize',
                saved: 'Saved'
            };

            // Index captures by sessionId for fast lookup. Track which ones
            // we matched to a session so we can list orphans afterward.
            const captureBySession = {};
            const captureTs = captureRows.map(c => {
                const ts = c['timestamp'];
                return ts ? (ts instanceof Date ? ts.getTime() : new Date(ts).getTime()) : NaN;
            });
            captureRows.forEach(c => {
                if (c['sessionId']) captureBySession[c['sessionId']] = c;
            });
            const matched = new Set();

            function findCapture(session) {
                let cap = captureBySession[session.sessionId];
                if (cap) {
                    matched.add(captureRows.indexOf(cap));
                    return cap;
                }
                // Fallback: same device, capture lands within 60s of the
                // session's last logged step. Pick the closest match.
                if (!session.completed || !session.deviceId) return null;
                let bestIdx = -1;
                let bestDist = Infinity;
                for (let i = 0; i < captureRows.length; i++) {
                    if (matched.has(i)) continue;
                    if (captureRows[i]['deviceId'] !== session.deviceId) continue;
                    const dist = Math.abs(captureTs[i] - session.lastTs);
                    if (Number.isNaN(dist) || dist > 60000) continue;
                    if (dist < bestDist) { bestDist = dist; bestIdx = i; }
                }
                if (bestIdx >= 0) {
                    matched.add(bestIdx);
                    return captureRows[bestIdx];
                }
                return null;
            }

            // Build session rows
            const rows = sessions.map(s => {
                const capture = findCapture(s);
                return { kind: 'session', sortTs: s.startedAt, session: s, capture };
            });

            // Append orphan captures (no matching session)
            captureRows.forEach((c, i) => {
                if (matched.has(i)) return;
                if (Number.isNaN(captureTs[i])) return;
                rows.push({ kind: 'capture-only', sortTs: captureTs[i], session: null, capture: c });
            });

            if (!rows.length) return '';

            rows.sort((a, b) => b.sortTs - a.sortTs);

            // Cluster adjacent rows from the same device that landed within
            // BURST_GAP_MS of each other — these are almost always one user
            // tapping in and out of the flow, not separate intent. Showing
            // them as a single collapsed row keeps the timeline scannable.
            // Clicking the cluster header reveals the individual rows.
            const BURST_GAP_MS = 5 * 60 * 1000; // 5 minutes
            const clusters = [];
            for (const r of rows) {
                const deviceId = (r.session && r.session.deviceId) || (r.capture && r.capture['deviceId']) || null;
                const last = clusters[clusters.length - 1];
                if (last
                    && last.deviceId
                    && last.deviceId === deviceId
                    && (last.minTs - r.sortTs) < BURST_GAP_MS) {
                    last.rows.push(r);
                    last.minTs = Math.min(last.minTs, r.sortTs);
                } else {
                    clusters.push({ deviceId, rows: [r], minTs: r.sortTs });
                }
            }
            // Cap how many clusters we show so the table stays bounded.
            const MAX_CLUSTERS = 40;
            const limitedClusters = clusters.slice(0, MAX_CLUSTERS);

            const startedCount = sessions.length;
            const savedCount = sessions.filter(s => s.completed).length;
            const completionPct = startedCount ? (savedCount / startedCount * 100).toFixed(0) : 0;
            const summaryLine = startedCount
                ? `${startedCount} started · ${savedCount} saved (${completionPct}%) · ${captureRows.length} total captures`
                : `${captureRows.length} captures`;

            let html = '<div class="table-card" style="max-width:900px;margin:0 auto 32px;overflow:visible">';
            html += `<h3>Capture Timeline <span style="color:#555;font-weight:400;font-size:13px">· ${summaryLine} · tap a row for details</span></h3>`;
            html += '<table><thead><tr>';
            html += '<th>Time</th><th>Device</th><th>Outcome</th><th>Last step</th><th>Duration</th>';
            html += '</tr></thead><tbody>';

            // Render one row in the timeline. extraClass lets the caller
            // tag it as a cluster-child so CSS can indent + colour it.
            function renderRow(r, extraClass) {
                const s = r.session;
                const c = r.capture;
                const deviceId = (s && s.deviceId) || (c && c['deviceId']) || null;
                const isInternal = deviceId && INTERNAL_DEVICES.has(deviceId);
                const isReview = deviceId && REVIEW_DEVICES.has(deviceId);
                const internalBadge = isInternal
                    ? ' <span class="badge" style="background:#1a1a2a;color:#6b8bba">INTERNAL</span>'
                    : (isReview ? ' <span class="badge" style="background:#2a201a;color:#ba9b6b">APP REVIEW</span>' : '');
                const opacity = (isInternal || isReview) ? 'opacity:0.5;' : '';
                const time = formatTime(new Date(r.sortTs));

                let outcomeBadge;
                if (s) {
                    outcomeBadge = s.completed
                        ? '<span class="badge badge-saved">Saved</span>'
                        : '<span class="badge badge-abandoned">Abandoned</span>';
                } else {
                    outcomeBadge = '<span class="badge badge-saved" style="opacity:0.7">Saved</span>';
                }

                let lastLabel = '—';
                let durationStr = '—';
                if (s) {
                    lastLabel = stepLabels[s.lastStep] || s.lastStep;
                    durationStr = s.durationMs > 0 ? formatDuration(s.durationMs) : '—';
                } else {
                    lastLabel = 'Capture only';
                }

                const modelCode = (s && s.deviceModel)
                    || (c && c['deviceModel'])
                    || (deviceId ? deviceModels[deviceId] : null);
                const modelLabel = modelCode ? deviceName(modelCode) : '—';

                const country = (c && c['country']) || (s && s.country) || null;
                const tz = (c && c['timezone']) || (s && s.timezone) || null;
                const flag = country ? countryFlag(country) + ' ' : '';
                const tzCity = tz && tz.includes('/')
                    ? tz.split('/').slice(1).join('/').replace(/_/g, ' ')
                    : (tz || null);

                // --- Detail modal content, pre-built so the row only needs
                // an index. Everything that used to be its own column
                // (type / category / die-cut / from / version) lives here,
                // plus the per-step trace the table never had room for.
                const when = new Date(r.sortTs);
                const fullTime = when.toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                let detail = `<h4>${outcomeBadge}${internalBadge}</h4>`;
                detail += `<div class="tl-modal-sub">${fullTime} · ${flag}${modelLabel}</div>`;
                if (s && s.stepTs) {
                    // The sheet logs a literal 'abandoned' step when the user
                    // NEXT opens the app — hours later. The synthetic red line
                    // below covers it; the raw row would show "+4139m".
                    const entries = Object.entries(s.stepTs)
                        .filter(([step]) => step !== 'abandoned')
                        .sort((a, b) => a[1] - b[1]);
                    const t0 = entries.length ? entries[0][1] : 0;
                    let steps = '';
                    entries.forEach(([step, ms]) => {
                        const off = ms - t0 === 0 ? 'start' : '+' + formatDuration(ms - t0);
                        steps += `<div class="tl-step"><span class="tl-step-dot"></span>${stepLabels[step] || step}<span class="tl-step-ts">${off}</span></div>`;
                    });
                    if (!s.completed) {
                        const exitLabel = s.abandonedAt ? ' at ' + (stepLabels[s.abandonedAt] || s.abandonedAt) : '';
                        steps += `<div class="tl-step"><span class="tl-step-dot" style="background:#ba6b6b"></span>Abandoned${exitLabel}<span class="tl-step-ts"></span></div>`;
                    }
                    detail += `<div class="tl-steps">${steps}</div>`;
                }
                const dRows = [];
                const dRow = (label, val) => { if (val) dRows.push(`<div class="tl-detail-row"><span>${label}</span><strong>${val}</strong></div>`); };
                if (s && durationStr !== '—') dRow('Duration', durationStr);
                if (c) {
                    const type = c['cardType'];
                    dRow('Card type', type ? `<span class="badge badge-${type}">${type}</span>` : null);
                    dRow('Category', c['category']);
                    dRow('Die-cut', (c['isDieCut'] === true || c['isDieCut'] === 'TRUE') ? 'Yes' : null);
                    dRow('From filled in', (c['hasFromPerson'] === true || c['hasFromPerson'] === 'TRUE') ? 'Yes' : null);
                    dRow('OS', c['osVersion']);
                }
                dRow('Location', [country ? `${countryFlag(country)} ${countryName(country)}` : null, tzCity].filter(Boolean).join(' · '));
                dRow('Build', (c && c['appVersion']) || (s && s.appVersion));
                dRow('Device', modelLabel + (modelCode && modelLabel !== modelCode ? ` <span style="color:#666">${modelCode}</span>` : ''));
                dRow('Device ID', deviceId ? `<span title="${deviceId}">${deviceId.slice(0, 8)}…</span>` : null);
                if (!s && c) dRow('Note', 'Capture without a funnel session (older build)');
                detail += dRows.join('');
                const detailIdx = tlDetails.push(detail) - 1;

                const cls = 'tl-click' + (extraClass ? ` ${extraClass}` : '');
                const style = (extraClass ? 'display:none;' : '') + opacity;
                const styleAttr = style ? ` style="${style}"` : '';

                return `<tr class="${cls}"${styleAttr} onclick="showTlDetail(${detailIdx})">
                    <td data-label="Time">${time}${internalBadge}</td>
                    <td data-label="Device">${flag}${modelLabel}</td>
                    <td data-label="Outcome">${outcomeBadge}</td>
                    <td data-label="Last step">${lastLabel}</td>
                    <td data-label="Duration">${durationStr}</td>
                </tr>`;
            }

            let clusterIdx = 0;
            limitedClusters.forEach(cluster => {
                if (cluster.rows.length === 1) {
                    html += renderRow(cluster.rows[0], null);
                    return;
                }

                // Multi-row cluster: header summary + hidden child rows.
                clusterIdx++;
                const clusterId = `tlc${clusterIdx}`;
                const cRows = cluster.rows;
                const newest = cRows[0];                   // most recent (rows are desc-sorted)
                const oldest = cRows[cRows.length - 1];
                const spanMs = newest.sortTs - oldest.sortTs;
                const sessionRows = cRows.filter(r => r.session);
                const savedInCluster = sessionRows.filter(r => r.session.completed).length;
                const abandonedInCluster = sessionRows.length - savedInCluster;
                const captureOnly = cRows.length - sessionRows.length;

                // Most common last step (only when we have session rows)
                let dominantStep = null;
                if (sessionRows.length) {
                    const counts = {};
                    sessionRows.forEach(r => {
                        counts[r.session.lastStep] = (counts[r.session.lastStep] || 0) + 1;
                    });
                    dominantStep = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
                }

                // Device + model for header
                const dId = cluster.deviceId;
                const isInternal = dId && INTERNAL_DEVICES.has(dId);
                const isReview = dId && REVIEW_DEVICES.has(dId);
                const sampleSession = sessionRows[0] && sessionRows[0].session;
                const sampleCapture = cRows.find(r => r.capture) && cRows.find(r => r.capture).capture;
                const modelCode = (sampleSession && sampleSession.deviceModel)
                    || (sampleCapture && sampleCapture['deviceModel'])
                    || (dId ? deviceModels[dId] : null);
                const clusterCountry = (sampleSession && sampleSession.country)
