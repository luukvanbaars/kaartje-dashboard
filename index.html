                    || (sampleCapture && sampleCapture['country']) || null;
                const clusterFlag = clusterCountry ? countryFlag(clusterCountry) + ' ' : '';
                const modelLabel = (modelCode ? deviceName(modelCode) : '—');
                const internalBadge = isInternal
                    ? ' <span class="badge" style="background:#1a1a2a;color:#6b8bba">INTERNAL</span>'
                    : (isReview ? ' <span class="badge" style="background:#2a201a;color:#ba9b6b">APP REVIEW</span>' : '');

                // Build the summary text
                const newestTime = formatTime(new Date(newest.sortTs));
                const spanLabel = spanMs > 0 ? formatDuration(spanMs) : '<1s';
                const outcomeBits = [];
                if (savedInCluster) outcomeBits.push(`<span style="color:#6bba6b">${savedInCluster} saved</span>`);
                if (abandonedInCluster) outcomeBits.push(`<span style="color:#ba6b6b">${abandonedInCluster} abandoned</span>`);
                if (captureOnly) outcomeBits.push(`${captureOnly} capture${captureOnly === 1 ? '' : 's'}`);
                const stepBit = dominantStep
                    ? ` · mostly <em style="font-style:normal;color:#bbb">${stepLabels[dominantStep] || dominantStep}</em>`
                    : '';

                const opacity = isInternal ? 'opacity:0.5;' : '';

                html += `<tr class="cluster-header" data-cluster-id="${clusterId}" onclick="toggleCluster('${clusterId}', this)" style="${opacity}">
                    <td colspan="5">
                        <span class="cluster-arrow">▶</span>
                        <strong style="color:#ccc">${cRows.length} sessions</strong> in a burst${internalBadge}
                        <span style="color:#666"> · ${newestTime} · span ${spanLabel} · ${clusterFlag}${modelLabel}</span>
                        <span style="color:#666"> · ${outcomeBits.join(' · ') || '—'}${stepBit}</span>
                    </td>
                </tr>`;

                cRows.forEach(r => {
                    html += renderRow(r, `cluster-row ${clusterId}`);
                });
            });

            html += '</tbody></table></div>';
            return html;
        }

        function renderDonut(data, colorMap) {
            const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
            const total = entries.reduce((s, e) => s + e[1], 0);
            const defaultColors = ['#ED9B61', '#6bba6b', '#6b8bba', '#ba6bba'];

            const size = 120;
            const cx = size / 2, cy = size / 2, r = 44, stroke = 14;
            const circumference = 2 * Math.PI * r;

            let offset = 0;
            let arcs = '';
            let legend = '';

            entries.forEach(([name, count], i) => {
                const color = colorMap[name] || defaultColors[i % defaultColors.length];
                const pct = count / total;
                const dashLen = pct * circumference;
                const gap = circumference - dashLen;

                arcs += `<circle cx="${cx}" cy="${cy}" r="${r}"
                    fill="none" stroke="${color}" stroke-width="${stroke}"
                    stroke-dasharray="${dashLen} ${gap}"
                    stroke-dashoffset="${-offset}"
                    transform="rotate(-90 ${cx} ${cy})" />`;

                offset += dashLen;

                legend += `<div class="legend-item">
                    <div class="legend-dot" style="background:${color}"></div>
                    ${name}
                    <span class="legend-count">${count} (${Math.round(pct*100)}%)</span>
                </div>`;
            });

            // Center text
            arcs += `<text x="${cx}" y="${cy}" text-anchor="middle" dy="0.35em"
                fill="#fff" font-size="20" font-weight="700">${total}</text>`;

            return `<div class="donut-container">
                <svg class="donut-svg" width="${size}" height="${size}">${arcs}</svg>
                <div class="donut-legend">${legend}</div>
            </div>`;
        }

        const DEVICE_NAMES = {
            // iPhone
            'iPhone8,1': 'iPhone 6s', 'iPhone8,2': 'iPhone 6s Plus', 'iPhone8,4': 'iPhone SE',
            'iPhone9,1': 'iPhone 7', 'iPhone9,3': 'iPhone 7', 'iPhone9,2': 'iPhone 7 Plus', 'iPhone9,4': 'iPhone 7 Plus',
            'iPhone10,1': 'iPhone 8', 'iPhone10,4': 'iPhone 8', 'iPhone10,2': 'iPhone 8 Plus', 'iPhone10,5': 'iPhone 8 Plus',
            'iPhone10,3': 'iPhone X', 'iPhone10,6': 'iPhone X',
            'iPhone11,2': 'iPhone XS', 'iPhone11,4': 'iPhone XS Max', 'iPhone11,6': 'iPhone XS Max', 'iPhone11,8': 'iPhone XR',
            'iPhone12,1': 'iPhone 11', 'iPhone12,3': 'iPhone 11 Pro', 'iPhone12,5': 'iPhone 11 Pro Max', 'iPhone12,8': 'iPhone SE (2nd)',
            'iPhone13,1': 'iPhone 12 mini', 'iPhone13,2': 'iPhone 12', 'iPhone13,3': 'iPhone 12 Pro', 'iPhone13,4': 'iPhone 12 Pro Max',
            'iPhone14,2': 'iPhone 13 Pro', 'iPhone14,3': 'iPhone 13 Pro Max', 'iPhone14,4': 'iPhone 13 mini', 'iPhone14,5': 'iPhone 13',

        function deviceName(model) {
            return DEVICE_NAMES[model] || model;
        }

        // ISO 3166 alpha-2 country code → flag emoji. Pure unicode trick:
        // each ASCII letter A–Z maps to a regional-indicator symbol; pasted
        // together they render as a flag. No table needed.
        function countryFlag(code) {
            if (!code || code.length !== 2) return '';
            const A = 0x1F1E6;
            const a = 'A'.charCodeAt(0);
            const c = code.toUpperCase();
            return String.fromCodePoint(A + c.charCodeAt(0) - a)
                 + String.fromCodePoint(A + c.charCodeAt(1) - a);
        }

        // ISO 3166 alpha-2 → display name via Intl. Falls back to the raw
        // code if the browser doesn't have it (very rare).
        const _countryNameCache = {};
        const _displayNames = (typeof Intl !== 'undefined' && Intl.DisplayNames)
            ? new Intl.DisplayNames(['en'], { type: 'region' })
            : null;
        function countryName(code) {
            if (!code) return '';
            if (_countryNameCache[code]) return _countryNameCache[code];
            let name = code;
            if (_displayNames) {
                try { name = _displayNames.of(code) || code; } catch (e) {}
            }
            _countryNameCache[code] = name;
            return name;
        }

        // Toggle a burst cluster open/closed in the Capture Timeline. Bound
        // inline via onclick on the header row; rows belonging to a cluster
        // share a class equal to its id.
        function toggleCluster(clusterId, headerEl) {
            const rows = document.querySelectorAll('tr.cluster-row.' + clusterId);
            if (!rows.length) return;
            const isOpen = rows[0].style.display !== 'none';
            // Empty string restores the STYLESHEET display (table-row on
            // desktop, block card on the mobile layout) instead of forcing
            // table-row, which broke the stacked mobile rows.
            rows.forEach(r => { r.style.display = isOpen ? 'none' : ''; });
            if (headerEl) headerEl.classList.toggle('open', !isOpen);
            const arrow = headerEl && headerEl.querySelector('.cluster-arrow');
            if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
        }

        // Capture Timeline detail modal. renderTimeline pre-builds each
        // row's detail HTML into tlDetails; the row's onclick opens it by
        // index. The overlay lives on <body>, so re-renders of #content
        // never clobber an open modal.
        let tlDetails = [];
        function showTlDetail(i) {
            const d = tlDetails[i];
            if (!d) return;
            let overlay = document.getElementById('tl-modal-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'tl-modal-overlay';
                overlay.className = 'tl-modal-overlay';
                overlay.addEventListener('click', e => { if (e.target === overlay) closeTlDetail(); });
                document.body.appendChild(overlay);
            }
            overlay.innerHTML = `<div class="tl-modal">
                <button class="tl-modal-close" onclick="closeTlDetail()" aria-label="Close">✕</button>
                ${d}
            </div>`;
            overlay.style.display = 'flex';
        }
        function closeTlDetail() {
            const overlay = document.getElementById('tl-modal-overlay');
            if (overlay) overlay.style.display = 'none';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTlDetail(); });

        // Wire up "Show internal" toggle. Flip state, persist, and re-render
        // from the cached response — no refetch needed.
        const internalToggle = document.getElementById('internal-toggle');
        internalToggle.checked = showInternal;
        internalToggle.addEventListener('change', (e) => {
            showInternal = e.target.checked;
            localStorage.setItem('showInternal', String(showInternal));
            if (cachedRows) renderDashboard(cachedRows, cachedFunnelRows, cachedFunnelSummary);
        });

        // Load on start
        fetchData();
    </script>
